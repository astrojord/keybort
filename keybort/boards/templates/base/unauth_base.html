{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Track your mechanical keyboard collection">

    <title>{% block page_title %}{% endblock page_title %} | Keybort</title>
    <link rel="shortcut icon" href="{% static "logos/keybort_icon.png" %}" />

    <link href="{% static 'site.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.1/dist/basecoat.cdn.min.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="{% static "fonts/fontawesome/css/fontawesome.min.css" %}" rel="stylesheet">
    <link href="{% static "fonts/fontawesome/css/solid.min.css" %}" rel="stylesheet">
    <link href="{% static "fonts/fontawesome/css/regular.min.css" %}" rel="stylesheet">

    {% block page_css %}{% endblock page_css %}
</head>
<body data-theme="dark">
	<main class="flex w-100 h-100">
		<div class="container flex flex-column">
			<div class="row vh-100">
				<div class="col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto d-table h-100">
                    {% block content %}{% endblock content %}
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.1/dist/js/all.min.js" defer></script>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("themeMode");
          if (stored ? stored === "dark" : matchMedia("(prefers-color-scheme: dark").matches) {
            document.documentElement.classList.add("dark")
          }
        } catch (_) {}
      })();
    </script>
    {% block page_js %}{% endblock page_js %}
</body>

</html>
