<header
    class="sticky inset-x-0 top-0 isolate h-12 p-2 z-30 flex shrink-0 items-center gap-2 bg-background"
>
    <div class="flex w-full items-center justify-between gap-2">
        <nav class="flex items-center gap-2">
            <button
                type="button"
                onclick="document.getElementById('sidebar')?.toggle()"
                aria-label="Toggle sidebar"
                data-tooltip="Toggle sidebar"
                data-side="bottom"
                data-align="start"
                class="btn"
                data-variant="ghost"
                data-size="icon-sm"
            >
                <!-- @license lucide-static v0.552.0 - ISC -->
                <svg
                    class="size-4 lucide lucide-panel-left"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                    <path d="M9 3v18"></path>
                </svg>
            </button>
            <div id="dropdown-menu" class="dropdown-menu">
                <button
                    type="button"
                    id="dropdown-menu-trigger"
                    aria-haspopup="menu"
                    aria-controls="dropdown-menu-menu"
                    aria-expanded="false"
                    class="btn"
                    data-variant="ghost"
                >
                    <i class="fa fa-user"></i>
                </button>
                <div
                    id="dropdown-menu-popover"
                    data-popover
                    aria-hidden="true"
                    class="w-40"
                >
                    <div
                        role="menu"
                        id="dropdown-menu-menu"
                        aria-labelledby="dropdown-menu-trigger"
                    >
                        <div role="group">
                            {% if request.user.is_authenticated %}
                            <div role="menuitem">
                                <a href="#">Profile</a>
                            </div>
                            <div role="menuitem">
                                <a href="{% url 'account_change_password' %}"
                                    >Change password</a
                                >
                            </div>
                            <div role="menuitem">
                                <a href="#">Settings</a>
                            </div>

                            {% else %}
                            <div role="menuitem">
                                <a href="{% url 'account_login' %}">Sign in</a>
                            </div>
                            {% endif %}
                        </div>
                        <hr role="separator" />
                        <div role="group">
                            <div role="menuitem">
                                <a href="https://github.com/astrojord/keybort"
                                    >GitHub</a
                                >
                            </div>
                        </div>
                        <hr role="separator" />
                        <div role="group">
                            <div role="menuitem">
                                <a href="{% url 'account_logout' %}">Log out</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <nav class="flex items-center gap-2">
            <button
                type="button"
                aria-label="Toggle dark mode"
                data-tooltip="Toggle dark mode"
                data-side="bottom"
                data-align="end"
                onclick="window.basecoat?.theme.toggle()"
                class="btn"
                data-variant="ghost"
                data-size="icon-sm"
            >
                <span class="hidden dark:block"
                    ><!-- @license lucide-static v0.552.0 - ISC -->
                    <svg
                        class="lucide lucide-sun"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path>
                        <path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path>
                        <path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path>
                        <path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path>
                        <path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                </span>
                <span class="block dark:hidden"
                    ><!-- @license lucide-static v0.552.0 - ISC -->
                    <svg
                        class="lucide lucide-moon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
                        ></path>
                    </svg>
                </span>
            </button>
        </nav>
    </div>
</header>
